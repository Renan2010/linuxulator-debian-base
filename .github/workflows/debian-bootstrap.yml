# Workflow name displayed in GitHub Actions tab
name: Daily Devuan Bootstrap Tarballs

# Triggers for the workflow
on:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI
    inputs:
      releases:
        description: 'Devuan releases (comma-separated)'
        required: false
        default: 'stable,testing,unstable'
        type: string
      arch:
        description: 'Architecture'
        required: false
        default: 'amd64'
        type: string

# Global environment variables
env:
  # Unique name for artifact grouping per workflow run
  ARTIFACT_NAME: devuan-bootstrap-${{ github.run_id }}
  # Fallback to defaults if not triggered manually
  RELEASES: ${{ github.event.inputs.releases || 'stable,testing,unstable' }}
  ARCH: ${{ github.event.inputs.arch || 'amd64' }}

jobs:
  # Build job - runs debootstrap for each release/arch combination
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Don't cancel other builds if one fails
      matrix:
        release: 
          - stable    # Currently Daedalus (Devuan 5)
          - testing   # Currently Excalibur
          - unstable  # Ceres - rolling release
        arch:
          - amd64     # 64-bit x86
          - i386      # 32-bit x86
          - arm64     # 64-bit ARM (Raspberry Pi 4/5, etc)
          - armhf     # 32-bit ARM hard float (Raspberry Pi 2/3, etc)
    
    steps:
      # Step 1: Clone the repository
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Install native debootstrap and QEMU for cross-architecture support
      # Devuan uses the same debootstrap tool but with Devuan repository
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap qemu-user-static

      # Step 3: Create working directory for this release/arch combination
      - name: Create workspace
        run: |
          mkdir -p workspace/${{ matrix.release }}-${{ matrix.arch }}
          chmod 755 workspace/${{ matrix.release }}-${{ matrix.arch }}

      # Step 4: Bootstrap Devuan base system
      - name: Run debootstrap
        run: |
          # For non-native architectures, use QEMU user mode emulation
          EXTRA_ARGS=""
          HOST_ARCH=$(dpkg --print-architecture)
          
          # If target architecture differs from host, first stage only
          if [ "${{ matrix.arch }}" != "$HOST_ARCH" ]; then
            EXTRA_ARGS="--foreign"
          fi
          
          # Devuan debootstrap:
          # Uses Devuan merged repository instead of Debian
          # --variant=minbase: Minimal base system (smaller tarball)
          # --include: Essential packages for Linuxulator
          # No need to exclude systemd - Devuan doesn't use it!
          # Includes sysvinit-core as default init system
          sudo debootstrap \
            --arch=${{ matrix.arch }} \
            --variant=minbase \
            --include=apt,ca-certificates,locales,dialog,libtinfo6,sysvinit-core \
            $EXTRA_ARGS \
            ${{ matrix.release }} \
            workspace/${{ matrix.release }}-${{ matrix.arch }} \
            http://deb.devuan.org/merged

      # Step 5: Post-bootstrap configuration for FreeBSD compatibility
      - name: Configure for FreeBSD Linuxulator
        run: |
          # Configure system inside chroot
          sudo chroot workspace/${{ matrix.release }}-${{ matrix.arch }} /bin/bash -c "
            # Generate minimal locale (en_US.UTF-8)
            echo 'en_US.UTF-8 UTF-8' > /etc/locale.gen
            locale-gen en_US.UTF-8 2>/dev/null || true
            
            # Devuan uses sysvinit by default - no systemd to remove!
            # Just verify sysvinit-core is installed
            dpkg -l | grep sysvinit-core || apt-get install -y sysvinit-core
            
            # Configure APT to not install recommended/suggested packages
            echo 'APT::Install-Recommends \"false\";' > /etc/apt/apt.conf.d/00norecommends
            echo 'APT::Install-Suggests \"false\";' >> /etc/apt/apt.conf.d/00norecommends
            
            # Fix APT cache size limit (prevents Dynamic MMap error on FreeBSD)
            echo 'APT::Cache-Start \"251658240\";' > /etc/apt/apt.conf.d/00cache
            echo 'APT::Cache-Limit \"251658240\";' >> /etc/apt/apt.conf.d/00cache
            echo 'APT::Cache-Grow \"10485760\";' >> /etc/apt/apt.conf.d/00cache
            
            # Clean package cache and lists to save space
            apt-get clean
            rm -rf /var/lib/apt/lists/*
            mkdir -p /var/lib/apt/lists/partial
          " || true  # Continue even if some commands fail

      # Step 6: Fix ownership and permissions for FreeBSD Linuxulator
      # CRITICAL: Libraries and binaries MUST have execute permission (755)
      # /tmp MUST have sticky bit (1777) for APT to work
      - name: Fix permissions for FreeBSD
        run: |
          # Everything owned by root (UID 0, GID 0)
          sudo chown -R 0:0 workspace/${{ matrix.release }}-${{ matrix.arch }}
          
          # Directories always 755
          sudo find workspace/${{ matrix.release }}-${{ matrix.arch }} -type d -exec chmod 755 {} \;
          
          # /tmp needs sticky bit (1777) so any user can write temporary files
          # This is required for APT to download and verify packages
          sudo chmod 1777 workspace/${{ matrix.release }}-${{ matrix.arch }}/tmp
          
          # /var/tmp also needs sticky bit
          if [ -d workspace/${{ matrix.release }}-${{ matrix.arch }}/var/tmp ]; then
            sudo chmod 1777 workspace/${{ matrix.release }}-${{ matrix.arch }}/var/tmp
          fi
          
          # Binaries and scripts in bin/sbin directories: 755
          sudo find workspace/${{ matrix.release }}-${{ matrix.arch }}/bin -type f -exec chmod 755 {} \; 2>/dev/null || true
          sudo find workspace/${{ matrix.release }}-${{ matrix.arch }}/sbin -type f -exec chmod 755 {} \; 2>/dev/null || true
          sudo find workspace/${{ matrix.release }}-${{ matrix.arch }}/usr/bin -type f -exec chmod 755 {} \; 2>/dev/null || true
          sudo find workspace/${{ matrix.release }}-${{ matrix.arch }}/usr/sbin -type f -exec chmod 755 {} \; 2>/dev/null || true
          
          # Shared libraries (.so files) MUST have execute permission for dynamic linker
          sudo find workspace/${{ matrix.release }}-${{ matrix.arch }}/lib -type f \( -name "*.so" -o -name "*.so.*" \) -exec chmod 755 {} \; 2>/dev/null || true
          sudo find workspace/${{ matrix.release }}-${{ matrix.arch }}/lib64 -type f \( -name "*.so" -o -name "*.so.*" \) -exec chmod 755 {} \; 2>/dev/null || true
          sudo find workspace/${{ matrix.release }}-${{ matrix.arch }}/usr/lib -type f \( -name "*.so" -o -name "*.so.*" \) -exec chmod 755 {} \; 2>/dev/null || true
          sudo find workspace/${{ matrix.release }}-${{ matrix.arch }}/usr/lib64 -type f \( -name "*.so" -o -name "*.so.*" \) -exec chmod 755 {} \; 2>/dev/null || true
          
          # Critical: ld-linux dynamic linker MUST be executable
          sudo find workspace/${{ matrix.release }}-${{ matrix.arch }} -name "ld-linux*" -exec chmod 755 {} \; 2>/dev/null || true
          sudo find workspace/${{ matrix.release }}-${{ matrix.arch }} -name "ld-*.so*" -exec chmod 755 {} \; 2>/dev/null || true
          
          # All other regular files: 644 (read-only for non-executables)
          sudo find workspace/${{ matrix.release }}-${{ matrix.arch }} -type f ! -perm /111 -exec chmod 644 {} \;

      # Step 7: Create compressed tarball with XZ compression
      - name: Create tarball
        run: |
          cd workspace/${{ matrix.release }}-${{ matrix.arch }}
          # Create tarball excluding virtual filesystems
          # tar cJf = create + XZ compress + file output
          # --numeric-owner preserves UID/GID 0:0 for FreeBSD compatibility
          sudo tar cJf ../../devuan-${{ matrix.release }}-${{ matrix.arch }}-$(date +%Y%m%d).tar.xz \
            --numeric-owner \
            --exclude=./dev/* \
            --exclude=./proc/* \
            --exclude=./sys/* \
            --exclude=./run/* \
            --exclude=./tmp/* \
            .
          # Change ownership to runner user for artifact upload
          sudo chown $(id -u):$(id -g) ../../devuan-${{ matrix.release }}-${{ matrix.arch }}-*.tar.xz

      # Step 8: Upload tarball as build artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # Unique name per release/arch combination
          name: devuan-${{ matrix.release }}-${{ matrix.arch }}
          path: devuan-${{ matrix.release }}-${{ matrix.arch }}-*.tar.xz
          compression-level: 0  # Already compressed, don't re-compress
          retention-days: 30    # Keep artifacts for 30 days

      # Step 9: Generate SHA256 checksum for integrity verification
      - name: Create checksum
        run: |
          cd workspace
          sha256sum ../devuan-${{ matrix.release }}-${{ matrix.arch }}-*.tar.xz > \
            ../devuan-${{ matrix.release }}-${{ matrix.arch }}-$(date +%Y%m%d).sha256
        continue-on-error: true  # Don't fail build if checksum generation fails

  # Release job - collects all artifacts and publishes as GitHub Release
  release:
    needs: build  # Wait for all build jobs to complete
    runs-on: ubuntu-latest
    # Only create releases for scheduled or manual runs (not commits)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write  # Required to create releases
    
    steps:
      # Step 1: Download all artifacts from build jobs
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: devuan-*      # Download all devuan artifacts
          merge-multiple: true    # Put them all in the same directory

      # Step 2: Generate release notes with complete setup instructions
      - name: Generate release notes
        run: |
          # Create markdown release notes
          cat > release.md << 'EOF'
          # Devuan Bootstrap Tarballs for FreeBSD Linuxulator
          
          Generated on: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ## Why Devuan?
          
          Devuan is a fork of Debian without systemd, using sysvinit as default init system.
          This makes it ideal for FreeBSD's Linuxulator since:
          - No systemd compatibility issues
          - Lighter init system (sysvinit)
          - Better compatibility with non-Linux kernels
          - Same package base as Debian (apt, dpkg, etc.)
          
          ## Available Releases
          - **Stable** (Daedalus) - Current stable release
          - **Testing** (Excalibur) - Next stable release
          - **Unstable** (Ceres) - Rolling release
          
          ## Available Architectures
          - amd64, i386, arm64, armhf
          
          ## Available Tarballs
          EOF
          
          # List all tarballs with their sizes
          ls -lh artifacts/*.tar.xz >> release.md
          
          # Add complete usage instructions for FreeBSD users
          cat >> release.md << 'EOF'
          
          ## Complete Setup on FreeBSD
          
          ### 1. Download tarball
          ```bash
          fetch <tarball-url>
          ```
          
          ### 2. Prepare the system
          ```bash
          # Create compat directory
          mkdir -p /compat/devuan
          
          # Extract tarball (preserving permissions)
          tar xJf devuan-stable-amd64-*.tar.xz -C /compat/devuan
          ```
          
          ### 3. Configure FreeBSD for Linuxulator
          ```bash
          # Load Linux kernel module
          kldload linux64
          
          # Enable Linux at boot
          echo 'linux_enable="YES"' >> /etc/rc.conf
          
          # Load at boot time too
          echo 'linux64_load="YES"' >> /boot/loader.conf
          ```
          
          ### 4. Mount required filesystems
          ```bash
          # Mount Linux-compatible filesystems
          mount -t linprocfs none /compat/devuan/proc
          mount -t linsysfs none /compat/devuan/sys
          mount -t devfs none /compat/devuan/dev
          mount -t tmpfs none /compat/devuan/tmp
          
          # Fix /tmp permissions (should be 1777 but mount may reset it)
          chmod 1777 /compat/devuan/tmp
          
          # Copy DNS configuration for network access inside chroot
          cp /etc/resolv.conf /compat/devuan/etc/resolv.conf
          ```
          
          ### 5. Enter Devuan chroot
          ```bash
          chroot /compat/devuan /bin/bash
          ```
          
          ### 6. First steps inside Devuan
          ```bash
          # Update package lists (APT cache limits are pre-configured)
          apt update
          
          # Upgrade packages if needed
          apt upgrade
          
          # Install additional packages
          apt install vim curl wget
          ```
          
          ### Optional: Auto-mount at boot
          Add to `/etc/fstab`:
          ```
          linprocfs   /compat/devuan/proc  linprocfs   rw      0 0
          linsysfs    /compat/devuan/sys   linsysfs    rw      0 0
          devfs       /compat/devuan/dev   devfs       rw      0 0
          tmpfs       /compat/devuan/tmp   tmpfs       rw      0 0
          ```
          
          ## Devuan vs Debian for Linuxulator
          
          | Feature | Devuan | Debian |
          |---------|--------|--------|
          | Init System | sysvinit ✅ | systemd ❌ |
          | Linuxulator Compat | High ✅ | Medium ⚠️ |
          | Package Base | Same as Debian | Debian |
          | APT | Yes ✅ | Yes ✅ |
          | systemd-free | Yes ✅ | No ❌ |
          
          ## Notes
          - Sysvinit is the default init system (no systemd!)
          - APT cache limit is pre-configured to 251MB
          - /tmp is pre-configured with sticky bit (1777)
          - Binaries and libraries have correct execute permissions
          - Tarballs are generated daily at 00:00 UTC
          - Only the last 7 daily releases are kept
          - Uses Devuan merged repository (deb.devuan.org)
          
          ## Verified Working
          - ✅ chroot works out-of-the-box
          - ✅ APT update works without permission errors
          - ✅ Package installation works
          - ✅ No systemd conflicts
          - ✅ Network configured via host resolv.conf
          - ✅ sysvinit compatible with Linuxulator
          EOF

      # Step 3: Create GitHub Release with all tarballs
      - name: Create/Update Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Nightly Devuan Bootstrap $(date +%Y-%m-%d)"
          tag_name: nightly-devuan-${{ github.run_number }}  # Unique tag per run
          files: artifacts/*                                  # Upload all tarballs
          body_path: release.md                               # Release description
          prerelease: false                                   # Mark as stable release
          make_latest: true                                   # Update "latest" pointer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}           # Auto-generated token

      # Step 4: Remove old releases to save space (keep only last 7)
      - name: Cleanup old releases
        uses: dev-drprasad/delete-older-releases@v0.2.1
        with:
          keep_latest: 7                       # Keep last 7 nightly releases
          delete_tag_pattern: nightly-devuan-  # Only delete Devuan nightly releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
